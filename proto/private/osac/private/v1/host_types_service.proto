syntax = "proto3";

package osac.private.v1;

import "google/api/annotations.proto";
import "google/protobuf/field_mask.proto";
import "osac/private/v1/host_type_type.proto";

message HostTypesListRequest {
  optional int32 offset = 1;
  optional int32 limit = 2;
  optional string filter = 3;
  optional string order = 4;
}

message HostTypesListResponse {
  int32 size = 3;
  int32 total = 4;
  repeated HostType items = 5;
}

message HostTypesGetRequest {
  string id = 1;
}

message HostTypesGetResponse {
  HostType object = 1;
}

message HostTypesCreateRequest {
  HostType object = 1;
}

message HostTypesCreateResponse {
  HostType object = 1;
}

message HostTypesUpdateRequest {
  HostType object = 1;
  google.protobuf.FieldMask update_mask = 2;

  // Lock enables optimistic locking. When set to true, the server verifies that the current version of the object
  // matches the value of the metadata.version field of the submitted object. If they differ the update will be
  // rejected. This is useful to prevent lost updates when multiple clients are modifying the same object concurrently.
  bool lock = 3;
}

message HostTypesUpdateResponse {
  HostType object = 1;
}

message HostTypesDeleteRequest {
  string id = 1;
}

message HostTypesDeleteResponse {}

message HostTypesSignalRequest {
  string id = 1;
}

message HostTypesSignalResponse {}

service HostTypes {
  rpc List(HostTypesListRequest) returns (HostTypesListResponse) {
    option (google.api.http) = {get: "/api/private/v1/host_types"};
  }
  rpc Get(HostTypesGetRequest) returns (HostTypesGetResponse) {
    option (google.api.http) = {
      get: "/api/private/v1/host_types/{id}"
      response_body: "object"
    };
  }
  rpc Create(HostTypesCreateRequest) returns (HostTypesCreateResponse) {
    option (google.api.http) = {
      post: "/api/private/v1/host_types"
      body: "object"
      response_body: "object"
    };
  }
  rpc Update(HostTypesUpdateRequest) returns (HostTypesUpdateResponse) {
    option (google.api.http) = {
      patch: "/api/private/v1/host_types/{object.id}"
      body: "object"
      response_body: "object"
    };
  }
  rpc Delete(HostTypesDeleteRequest) returns (HostTypesDeleteResponse) {
    option (google.api.http) = {delete: "/api/private/v1/host_types/{id}"};
  }

  // Indicates that something changed in the object or the system that may require reconciling the object.
  rpc Signal(HostTypesSignalRequest) returns (HostTypesSignalResponse) {}
}
